version: "3.9"

# ─────────────────────────────────────────────
# Réseau partagé par toutes les apps du dossier dev/.
# Nom fixe (name: dev-net) pour éviter le préfixe automatique.
# Les apps le déclarent comme externe :
#   networks:
#     dev-net:
#       external: true
#       name: dev-net
# ─────────────────────────────────────────────
networks:
  dev-net:
    driver: bridge
    name: dev-net
  # Réseau de sso-lab : permet à pgAdmin d'atteindre Keycloak
  # en résolution Docker interne (keycloak:8080).
  sso-net:
    external: true
    name: sso-lab_sso-net

# ─────────────────────────────────────────────
# Volumes nommés : les données survivent à
#   docker compose down  (mais pas à --volumes)
# ─────────────────────────────────────────────
volumes:
  postgres-data:
  postgis-data:
  pgadmin-data:

services:

  # ──────────────────────────────────────────
  # PostgreSQL — base de données partagée
  #
  # ISOLATION RÉSEAU :
  #   Aucune directive 'ports' → le port 5432 n'est pas
  #   exposé sur l'hôte ni sur Internet.
  #   Seuls les containers rattachés à dev-net peuvent
  #   joindre ce service via postgres:5432.
  #
  # UN SCHÉMA PAR APPLICATION :
  #   Toutes les apps partagent la base 'devdb'.
  #   Chaque app écrit dans son propre schéma
  #   (ex. spring_app, future_app…) déclaré dans
  #   init/00_schemas.sql.
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dev-postgres
    restart: always
    env_file: .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Scripts exécutés au 1er démarrage (ordre alphanumérique)
      - ./init:/docker-entrypoint-initdb.d:ro
    networks:
      - dev-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # PostGIS — seconde instance PostgreSQL, dédiée aux apps SIG
  #
  # POURQUOI UNE INSTANCE SÉPARÉE (et pas un schéma de plus sur 'postgres') :
  #   - 'postgres' tourne en image alpine (musl), sans l'extension PostGIS.
  #     Le paquet postgis d'Alpine dépend de postgresql18, incompatible avec
  #     le PG16 de devdb.
  #   - Les images postgis/postgis officielles sont Debian/glibc. Basculer le
  #     datadir existant de devdb (collation en_US.utf8 sur musl) vers glibc
  #     corromprait silencieusement les index texte — et serait en plus un
  #     DOWNGRADE (16.14 → 16.9 au mieux sur les tags PostGIS stables).
  #   - Bénéfice annexe : une charge SIG lourde (import raster, Voronoï sur
  #     toute la France) ne peut pas dégrader les 6 autres apps qui partagent
  #     'postgres', et le rôle read-only de pg_featureserv (accès QGIS, cf.
  #     carto-lab) reste enfermé dans une base qui ne contient QUE du SIG.
  #
  # ISOLATION RÉSEAU : comme 'postgres', aucun port publié.
  #
  # Identifiants sous POSTGIS_DB/POSTGIS_USER/POSTGIS_PASSWORD (infra/.env) —
  # noms distincts de POSTGRES_*, pour que reset_url.sh propage les deux jeux
  # sans collision (upsert_env est un no-op quand la clé cible est absente).
  #
  # Scripts d'init montés UN PAR UN (pas tout le dossier) : l'image postgis
  # embarque son propre /docker-entrypoint-initdb.d/10_postgis.sh (CREATE
  # EXTENSION postgis) — monter le dossier entier l'écraserait.
  # ──────────────────────────────────────────
  postgis:
    image: postgis/postgis:16-3.5
    container_name: dev-postgis
    restart: always
    environment:
      POSTGRES_DB: "${POSTGIS_DB}"
      POSTGRES_USER: "${POSTGIS_USER}"
      POSTGRES_PASSWORD: "${POSTGIS_PASSWORD}"
    volumes:
      - postgis-data:/var/lib/postgresql/data
      - ./init-postgis/00_schemas.sql:/docker-entrypoint-initdb.d/00_schemas.sql:ro
      - ./init-postgis/01_pg_hba_trust.sh:/docker-entrypoint-initdb.d/01_pg_hba_trust.sh:ro
    networks:
      - dev-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # pgAdmin 4 — interface web PostgreSQL
  #
  # AUTHENTIFICATION :
  #   Login interne désactivé → seul Keycloak (OAuth2) est accepté.
  #   Accès réservé aux membres du groupe LDAP 'developers'.
  #
  # PRÉREQUIS :
  #   1. sso-lab en cours d'exécution
  #   2. bash infra/setup-keycloak-pgadmin.sh  (une seule fois)
  #   3. Copier PGADMIN_OAUTH2_CLIENT_SECRET dans infra/.env
  #
  # URL : http://localhost:5050
  # ──────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: dev-pgadmin
    restart: always
    env_file: .env
    environment:
      PGADMIN_SERVER_JSON_FILE: /var/lib/pgadmin/servers.json
      KEYCLOAK_PUBLIC_URL: "${KEYCLOAK_PUBLIC_URL}"
    entrypoint: ["/bin/sh", "/pgadmin4/docker-entrypoint.sh"]
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/config_local.py:/pgadmin4/config_local.py:ro
      - ./pgadmin/docker-entrypoint.sh:/pgadmin4/docker-entrypoint.sh:ro
    ports:
      - "${PORT_PGADMIN}:80"
    networks:
      - dev-net   # pour atteindre postgres:5432 et postgis:5432
      - sso-net   # pour atteindre keycloak:8080 (token endpoint)
    depends_on:
      postgres:
        condition: service_healthy
      postgis:
        condition: service_healthy
