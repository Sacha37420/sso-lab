version: "3.9"

# ─────────────────────────────────────────────
# Réseau interne partagé par tous les services.
# Les services se joignent par leur nom :
#   ex. openldap:389  keycloak:8080
# ─────────────────────────────────────────────
networks:
  sso-net:
    driver: bridge

# ─────────────────────────────────────────────
# Volumes nommés : les données survivent à
#   docker compose down  (mais pas à --volumes)
# ─────────────────────────────────────────────
volumes:
  ldap-data:
  ldap-config:
  keycloak-data:
  caddy-data:
  code-server-data:

services:

  # ──────────────────────────────────────────
  # Caddy (reverse-proxy HTTPS)
  # Écoute sur 80/443, récupère les certs Let's Encrypt automatiquement.
  # Découvre les services via les labels Docker sur chaque container.
  # Prérequis : DOMAIN et ACME_EMAIL renseignés dans .env + reset_url.sh lancé.
  # ──────────────────────────────────────────
  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "${PORT_HTTP:-80}:80"
      - "${PORT_HTTPS:-443}:443"
    environment:
      CADDY_INGRESS_NETWORKS: "sso-lab_sso-net"
      CADDY_DOCKER_CADDYFILE_PATH: /etc/caddy/Caddyfile
      ACME_EMAIL: "${ACME_EMAIL}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - caddy-data:/data
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - sso-net

  # ──────────────────────────────────────────
  # OpenLDAP
  # Image : bitnami/openldap (maintenue activement, remplace osixia)
  # Rôle  : annuaire d'identités (users/groups)
  # ──────────────────────────────────────────
  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    restart: always
    environment:
      LDAP_ORGANISATION: "SSO Lab"
      LDAP_DOMAIN: "${LDAP_DOMAIN}"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD}"
      LDAP_CONFIG_PASSWORD: "${LDAP_CONFIG_PASSWORD}"
      LDAP_ADDITIONAL_MODULES: "memberof"
      LDAP_SEED_INTERNAL_LDIF_PATH: "/container/service/slapd/assets/config/bootstrap/ldif/custom"
    volumes:
      - ldap-data:/var/lib/ldap
      - ldap-config:/etc/ldap/slapd.d
      - ./ldap/init.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/init.ldif:ro
    ports:
      - "${PORT_LDAP}:${PORT_LDAP}"
    networks:
      - sso-net
    command: ["--copy-service", "--loglevel", "debug"]

  # ──────────────────────────────────────────
  # phpLDAPadmin
  # Interface web pour explorer / éditer l'annuaire
  # ──────────────────────────────────────────
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: phpldapadmin
    restart: always
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "${PORT_PHPLDAPADMIN}:80"
    networks:
      - sso-net
    depends_on:
      - openldap

  # ──────────────────────────────────────────
  # Keycloak
  # IdP SSO : gère l'authentification et émet les tokens JWT
  # Version 22+ utilise Quarkus (remplace WildFly)
  # ──────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:22.0
    container_name: keycloak
    restart: always
    env_file: .env
    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      # KC_PROXY edge : indique à Keycloak qu'il est derrière un reverse-proxy TLS (Caddy).
      # Requis pour que les redirects et l'iss des JWT utilisent https.
      KC_PROXY: "edge"
      # KC_HOSTNAME_URL : fixe l'issuer JWT à une valeur stable.
      # HTTP  → http://IP_WAN:8080  |  HTTPS → https://auth.DOMAINE
      # Mis à jour par reset_url.sh via KEYCLOAK_HOSTNAME_URL dans .env
      KC_HOSTNAME_URL: "${KEYCLOAK_HOSTNAME_URL}"
      # KC_HOSTNAME_ADMIN_URL : fixe l'URL de la console admin indépendamment du
      # path stripping de Caddy (/auth/* → /). Sans ça, Keycloak calcule le
      # redirect_uri depuis la requête brute (IP locale, sans préfixe /auth)
      # → invalid_redirect_uri → la console reste bloquée sur "Loading the Admin UI".
      KC_HOSTNAME_ADMIN_URL: "${KEYCLOAK_HOSTNAME_URL}"
    ports:
      - "${PORT_KEYCLOAK}:8080"
    networks:
      - sso-net
    depends_on:
      - openldap
    command: ["start-dev"]
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak-theme/ssolab:/opt/keycloak/themes/ssolab:ro
    labels:
      caddy: "${DOMAIN}"
      caddy.handle_path: "/auth/*"
      caddy.handle_path.reverse_proxy: "{{upstreams 8080}}"

  # ──────────────────────────────────────────
  # oauth2-proxy — SSO Keycloak devant code-server
  # Intercepte /code/*, vérifie la session Keycloak, puis forward à code-server.
  # Le client Keycloak "code-server" doit être créé avant le premier démarrage :
  #   bash sso-lab/setup-code-server-auth.sh
  # ──────────────────────────────────────────
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2-proxy-code
    restart: unless-stopped
    environment:
      # Provider OIDC — Keycloak
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      # L'issuer doit correspondre exactement au claim iss dans les tokens Keycloak
      OAUTH2_PROXY_OIDC_ISSUER_URL: "${KEYCLOAK_HOSTNAME_URL}/realms/ssolab"
      OAUTH2_PROXY_CLIENT_ID: code-server
      OAUTH2_PROXY_CLIENT_SECRET: "${CODE_SERVER_CLIENT_SECRET}"
      # Discovery manuelle : LOGIN_URL = URL externe (browser redirect),
      # REDEEM_URL + JWKS_URL = réseau Docker interne (échanges serveur-serveur).
      # Évite les problèmes DNS split-horizon quand le DOMAIN n'est pas résolvable
      # depuis l'intérieur du réseau Docker.
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
      OAUTH2_PROXY_LOGIN_URL: "${KEYCLOAK_HOSTNAME_URL}/realms/ssolab/protocol/openid-connect/auth"
      OAUTH2_PROXY_REDEEM_URL: "http://keycloak:8080/realms/ssolab/protocol/openid-connect/token"
      OAUTH2_PROXY_OIDC_JWKS_URL: "http://keycloak:8080/realms/ssolab/protocol/openid-connect/certs"
      # Proxy vers code-server
      OAUTH2_PROXY_UPSTREAM: "http://code-server:8091"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_REDIRECT_URL: "https://${DOMAIN}/code/oauth2/callback"
      # Cookie de session signé (HTTPS uniquement)
      OAUTH2_PROXY_COOKIE_SECRET: "${CODE_SERVER_COOKIE_SECRET}"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: "lax"
      OAUTH2_PROXY_COOKIE_NAME: "_oauth2_proxy_code"
      # Accès : tous les utilisateurs authentifiés dans le realm ssolab
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
    networks:
      - sso-net
    depends_on:
      - keycloak
      - code-server
    labels:
      caddy: "${DOMAIN}"
      caddy.handle_path: "/code/*"
      caddy.handle_path.reverse_proxy: "{{upstreams 4180}}"

  # ──────────────────────────────────────────
  # Code Server — VS Code dans le navigateur
  # Workspace : /home/sacha/dev (même répertoire que SSH)
  # Claude Code CLI pré-installé dans l'image
  # Non exposé directement : passe obligatoirement par oauth2-proxy
  # ──────────────────────────────────────────
  code-server:
    build: ./code-server
    container_name: code-server
    restart: unless-stopped
    user: "1000:1000"
    environment:
      - HOME=/home/coder
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Dev}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-dev@localhost}
      - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME:-Dev}
      - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL:-dev@localhost}
    volumes:
      - /home/sacha/dev:/home/coder/dev:rw
      - /home/sacha/.claude:/home/coder/.claude:rw
      - /home/sacha/.ssh:/home/coder/.ssh:ro
      - code-server-data:/home/coder/.local
    command:
      - code-server
      - --bind-addr=0.0.0.0:8091
      # auth=none : l'authentification est entièrement gérée par oauth2-proxy en amont.
      # code-server n'est pas exposé directement (pas de labels Caddy).
      - --auth=none
      - /home/coder/dev
    networks:
      - sso-net

  # ──────────────────────────────────────────
  # Spring Boot App (construite à l'étape 3)
  # Commentée pour l'instant : on l'activera quand le JAR existe
  # ──────────────────────────────────────────
  # spring-app:
  #   build: ./spring-app
  #   container_name: spring-app
