version: "3.9"

# ─────────────────────────────────────────────
# Réseau interne partagé par tous les services.
# Les services se joignent par leur nom :
#   ex. openldap:389  keycloak:8080
# ─────────────────────────────────────────────
networks:
  sso-net:
    driver: bridge

# ─────────────────────────────────────────────
# Volumes nommés : les données survivent à
#   docker compose down  (mais pas à --volumes)
# ─────────────────────────────────────────────
volumes:
  ldap-data:
  ldap-config:
  keycloak-data:
  caddy-data:
  code-server-data:

services:

  # ──────────────────────────────────────────
  # Caddy (reverse-proxy HTTPS)
  # Écoute sur 80/443, récupère les certs Let's Encrypt automatiquement.
  # Découvre les services via les labels Docker sur chaque container.
  # Prérequis : DOMAIN et ACME_EMAIL renseignés dans .env + reset_url.sh lancé.
  # ──────────────────────────────────────────
  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "${PORT_HTTP:-80}:80"
      - "${PORT_HTTPS:-443}:443"
    environment:
      CADDY_INGRESS_NETWORKS: "sso-lab_sso-net"
      CADDY_DOCKER_CADDYFILE_PATH: /etc/caddy/Caddyfile
      ACME_EMAIL: "${ACME_EMAIL}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - caddy-data:/data
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - sso-net

  # ──────────────────────────────────────────
  # OpenLDAP
  # Image : bitnami/openldap (maintenue activement, remplace osixia)
  # Rôle  : annuaire d'identités (users/groups)
  # ──────────────────────────────────────────
  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    restart: always
    environment:
      LDAP_ORGANISATION: "SSO Lab"
      LDAP_DOMAIN: "${LDAP_DOMAIN}"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD}"
      LDAP_CONFIG_PASSWORD: "${LDAP_CONFIG_PASSWORD}"
      LDAP_ADDITIONAL_MODULES: "memberof"
      LDAP_SEED_INTERNAL_LDIF_PATH: "/container/service/slapd/assets/config/bootstrap/ldif/custom"
    volumes:
      - ldap-data:/var/lib/ldap
      - ldap-config:/etc/ldap/slapd.d
      - ./ldap/init.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/init.ldif:ro
    ports:
      - "${PORT_LDAP}:${PORT_LDAP}"
    networks:
      - sso-net
    command: ["--copy-service", "--loglevel", "debug"]

  # ──────────────────────────────────────────
  # phpLDAPadmin
  # Interface web pour explorer / éditer l'annuaire
  # ──────────────────────────────────────────
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: phpldapadmin
    restart: always
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "${PORT_PHPLDAPADMIN}:80"
    networks:
      - sso-net
    depends_on:
      - openldap

  # ──────────────────────────────────────────
  # Keycloak
  # IdP SSO : gère l'authentification et émet les tokens JWT
  # Version 22+ utilise Quarkus (remplace WildFly)
  # ──────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:22.0
    container_name: keycloak
    restart: always
    env_file: .env
    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      # KC_PROXY edge : indique à Keycloak qu'il est derrière un reverse-proxy TLS (Caddy).
      # Requis pour que les redirects et l'iss des JWT utilisent https.
      KC_PROXY: "edge"
      # KC_HOSTNAME_URL : fixe l'issuer JWT à une valeur stable.
      # HTTP  → http://IP_WAN:8080  |  HTTPS → https://auth.DOMAINE
      # Mis à jour par reset_url.sh via KEYCLOAK_HOSTNAME_URL dans .env
      KC_HOSTNAME_URL: "${KEYCLOAK_HOSTNAME_URL}"
      # KC_HOSTNAME_ADMIN_URL : fixe l'URL de la console admin indépendamment du
      # path stripping de Caddy (/auth/* → /). Sans ça, Keycloak calcule le
      # redirect_uri depuis la requête brute (IP locale, sans préfixe /auth)
      # → invalid_redirect_uri → la console reste bloquée sur "Loading the Admin UI".
      KC_HOSTNAME_ADMIN_URL: "${KEYCLOAK_HOSTNAME_URL}"
    ports:
      - "${PORT_KEYCLOAK}:8080"
    networks:
      - sso-net
    depends_on:
      - openldap
    command: ["start-dev"]
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak-theme/ssolab:/opt/keycloak/themes/ssolab:ro
    labels:
      caddy: "${DOMAIN}"
      caddy.handle_path: "/auth/*"
      caddy.handle_path.reverse_proxy: "{{upstreams 8080}}"

  # ──────────────────────────────────────────
  # Code Server — VS Code dans le navigateur
  # Workspace : /home/sacha/dev (même répertoire que SSH)
  # Claude Code CLI pré-installé dans l'image
  # Accessible via Caddy : /code/*
  # ──────────────────────────────────────────
  code-server:
    build: ./code-server
    container_name: code-server
    restart: unless-stopped
    # Tourne en tant que l'utilisateur hôte (UID 1000 = sacha) pour que
    # git, SSH et les permissions de fichiers correspondent au répertoire monté.
    user: "1000:1000"
    environment:
      - HOME=/home/coder
      # Identité git héritée de l'hôte
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Dev}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-dev@localhost}
      - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME:-Dev}
      - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL:-dev@localhost}
    volumes:
      # Workspace = même dossier qu'en SSH
      - /home/sacha/dev:/home/coder/dev:rw
      # Auth Claude Code : même session OAuth que VS Code local (pas de clé API)
      - /home/sacha/.claude:/home/coder/.claude:rw
      # Clés SSH pour git push
      - /home/sacha/.ssh:/home/coder/.ssh:ro
      # Persistance des extensions VS Code et paramètres entre redémarrages
      - code-server-data:/home/coder/.local
    command:
      - code-server
      - --bind-addr=0.0.0.0:8091
      # Mot de passe activé : seul l'accès via DOMAIN/code/ est possible,
      # mais un mot de passe reste préférable si DOMAIN est public.
      # Mettre PASSWORD dans sso-lab/.env pour changer.
      - --auth=password
      - /home/coder/dev
    networks:
      - sso-net
    labels:
      caddy: "${DOMAIN}"
      caddy.handle_path: "/code/*"
      caddy.handle_path.reverse_proxy: "{{upstreams 8091}}"

  # ──────────────────────────────────────────
  # Spring Boot App (construite à l'étape 3)
  # Commentée pour l'instant : on l'activera quand le JAR existe
  # ──────────────────────────────────────────
