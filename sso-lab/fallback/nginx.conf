server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Caddy parle à ce container en HTTP : sans ça, nginx forge un Location
    # absolu en http:// et le navigateur repasse par la redirection http→https
    # de Caddy. Un Location relatif conserve le schéma et l'hôte d'origine.
    absolute_redirect off;

    # Un préfixe d'app tapé sans slash final (/lora) ne matche pas le
    # `handle_path /lora/*` déclaré par l'app et atterrit donc ici. On retente
    # avec le slash : la requête suivante tombera sur l'app. Un chemin déjà
    # terminé par "/" ne matche pas cette règle, donc pas de boucle. Les
    # chemins contenant un point (favicon.ico…) sont exclus : ce sont des
    # fichiers, pas des préfixes d'app.
    location ~ ^[^.]*[^/.]$ {
        return 302 $uri/$is_args$args;
    }

    location / {
        return 404;
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }
}
